name: Deploy to AUR

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write   # needed to commit the version bump back to this repo

concurrency:
  group: deploy-to-aur
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest upstream tag
        id: latest
        run: |
          set -e
          LATEST_VER=$(git ls-remote --tags https://github.com/FN-FAL113/server-picker-x.git \
            | awk -F/ '{print $3}' | grep -v '\^{}' | sed 's/^v//' | sort -V | tail -n1)
          if [ -z "$LATEST_VER" ]; then
            echo "Could not determine latest tag, aborting." >&2
            exit 1
          fi
          echo "Latest found version is: $LATEST_VER"
          echo "latest=$LATEST_VER" >> "$GITHUB_OUTPUT"

      - name: Check if update is needed
        id: check
        run: |
          set -e
          CURRENT=$(grep -Po '^pkgver=\K.*' PKGBUILD)
          LATEST="${{ steps.latest.outputs.latest }}"
          echo "current=$CURRENT"
          echo "latest=$LATEST"
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "update=false" >> "$GITHUB_OUTPUT"
          else
            echo "update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump PKGBUILD version
        if: steps.check.outputs.update == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          set -e
          sed -i "s/^pkgver=.*/pkgver=${{ steps.latest.outputs.latest }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

      # Same fix as the other two packages: without committing the bump back
      # to THIS repo, next run's check step keeps comparing against the old
      # pkgver forever and "update" gets stuck on true permanently.
      #
      # Guarded with a diff check rather than just the if:, because a manual
      # workflow_dispatch run with no real tag change still runs the bump
      # step above, but may produce zero changes -- in which case there's
      # nothing to commit and `git commit` would otherwise fail the job.
      - name: Commit version bump back to repo
        if: steps.check.outputs.update == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD
          if git diff --staged --quiet; then
            echo "No PKGBUILD changes to commit."
          else
            git commit -m "Bump pkgver to ${{ steps.latest.outputs.latest }}"
            git push
          fi

      - name: Deploy to AUR
        if: steps.check.outputs.update == 'true' || github.event_name == 'workflow_dispatch'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: server-picker-x-git
          pkgbuild: ./PKGBUILD
          updpkgsums: true
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_username: ${{ secrets.AUR_COMMIT_USERNAME }}
          commit_email: ${{ secrets.AUR_COMMIT_EMAIL }}
          allow_empty_commits: false
